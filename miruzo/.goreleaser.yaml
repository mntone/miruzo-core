version: 2

before:
  hooks:
    - go mod verify

builds:
  - &go_build_common
    main: ./cmd/miruzo-api
    id: miruzo-api
    binary: miruzo-api
    gcflags:
      - all=-trimpath={{.Env.GOPATH}}
    ldflags:
      - -s -w {{- if not .IsSnapshot }}-X main.version={{.Version}}-{{.ShortCommit}}{{- if .IsGitDirty }}+dev{{ end }}{{ end }}
    env:
      - CGO_ENABLED=1
      - CGO_CFLAGS='-Os'
      - CGO_CXXFLAGS='-Os'
      - CGO_FFLAGS='-Os'
      - CGO_LDFLAGS='-Os'
    goos:
      - linux
      - windows
    goarch:
      - '386'
      - amd64
      - arm64
    goamd64:
      - v3
    ignore:
      - goos: windows
        goarch: '386'
      - goos: windows
        goarch: arm64
    overrides:
      - goos: linux
        goarch: '386'
        env:
          - CC=i686-linux-gnu-gcc
          - CXX=i686-linux-gnu-g++
      - goos: linux
        goarch: amd64
        env:
          - CC=x86_64-linux-gnu-gcc
          - CXX=x86_64-linux-gnu-g++
      - goos: linux
        goarch: arm64
        env:
          - CC=aarch64-linux-gnu-gcc
          - CXX=aarch64-linux-gnu-g++
      - goos: windows
        goarch: '386'
        go386: sse2
        env:
          - CC=i686-w64-mingw32-gcc
          - CXX=i686-w64-mingw32-g++
      - goos: windows
        goarch: amd64
        goamd64: v3
        env:
          - CC=x86_64-w64-mingw32-gcc
          - CXX=x86_64-w64-mingw32-g++

  - <<: *go_build_common
    main: ./cmd/miruzo-cli
    id: miruzo-cli
    binary: miruzo-cli

archives:
  - formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86-64{{ if not (eq .Amd64 "v1") }}-{{ .Amd64 }}{{ end }}
      {{- else if eq .Arch "386" }}x86
      {{- else if eq .Arch "arm64" }}aarch64{{ if not (eq .Arm64 "v8.0") }}-{{ .Arm64 }}{{ end }}
      {{- else }}{{ .Arch }}
      {{- end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

report_sizes: true
