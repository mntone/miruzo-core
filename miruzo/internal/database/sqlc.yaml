version: "2"
sql:
  - engine: postgresql
    queries: postgres/queries/
    schema: postgres/migrations
    gen:
      go:
        package: gen
        out: postgres/gen
        sql_package: pgx/v5
        emit_interface: false
        overrides:
        - db_type: finite_timestamp
          go_type: time.Time
        - db_type: finite_timestamp
          nullable: true
          go_type:
            type: time.Time
            pointer: true
        - column: "ingests.executions"
          go_type:
            import: github.com/mntone/miruzo-core/miruzo/internal/model
            type: Execution
        - column: "images.original"
          go_type:
            import: github.com/mntone/miruzo-core/miruzo/internal/model/media
            type: Variant
        - column: "images.fallback"
          go_type:
            import: github.com/mntone/miruzo-core/miruzo/internal/model/media
            type: Variant
            pointer: true
        - column: "images.variants"
          go_type:
            import: github.com/mntone/miruzo-core/miruzo/internal/model/media
            type: Variant
            slice: true
        - column: "users.daily_love_used"
          go_type: int32
  - engine: sqlite
    queries: sqlite/queries/
    schema: sqlite/migrations
    gen:
      go:
        package: gen
        out: sqlite/gen
        emit_interface: false
        overrides:
        - column: "ingests.executions"
          go_type:
            type: "[]byte"
        - column: "images.original"
          go_type:
            type: "[]byte"
        - column: "images.fallback"
          go_type:
            type: "[]byte"
            pointer: true
        - column: "images.variants"
          go_type:
            type: "[]byte"
        - column: "stats.score"
          go_type: int16
        - column: "stats.score_evaluated"
          go_type: int16
        - column: "actions.occurred_at"
          go_type: time.Time
        - column: "users.daily_love_used"
          go_type: int32
